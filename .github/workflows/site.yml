
name: build-deploy
on:
  schedule:
    - cron: "0 15 * * *"
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y libarchive-dev libcurl4-openssl-dev libxml2-dev libssl-dev
      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("jsonlite","dplyr","purrr","stringr","lubridate","tibble","xml2","rvest","urltools","httr2","tidyRSS","bslib","shiny","archive"), repos="https://cloud.r-project.org")'
          Rscript -e 'if(!requireNamespace("shinylive")) install.packages("shinylive", repos="https://cloud.r-project.org")'
      - name: Fetch articles
        run: Rscript R/fetch_articles.R
      - name: Export Shinylive
        run: Rscript build.R
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
