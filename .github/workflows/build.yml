name: build-site

on:
  schedule:
    - cron: "0 15 * * *"   # JST 0:00 相当
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

env:
  # Node 24 に先行opt-in（将来の強制切替に備える）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'   # または 'release'

      - name: Setup dependencies (pak + sysreqs)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # 必要パッケージ（DESCRIPTIONをまだ使わない前提の直接指定）
          extra-packages: >
            any::tidyRSS
            any::dplyr
            any::purrr
            any::stringr
            any::lubridate
            any::httr2
            any::jsonlite
            any::rvest
            any::urltools
            any::tibble
            any::bslib
            any::shiny
            any::shinylive
          needs: check

      - name: Fetch articles (make JSON)
        run: Rscript R/fetch_articles.R

      - name: Export Shiny app to static (Shinylive)
        run: Rscript -e 'shinylive::export("app", "docs")'

      - name: Commit & push
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: daily build"
          add: "docs app/data/articles.json"
          default_author: github_actions